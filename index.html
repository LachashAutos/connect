<!DOCTYPE html>
<html>
<head>
  <title>Open WhatsApp</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="margin:0; font-family:sans-serif; text-align:center;">

<div style="margin-top:35vh;">
  <h2>Lachash Autos</h2>
  <p>Tap below to continue</p>

  <!-- Main Button -->
  <a id="openBtn" href="#" 
     style="padding:14px 24px; background:#25D366; color:#fff; border-radius:8px; text-decoration:none; display:inline-block;">
     Open WhatsApp
  </a>
</div>

<script>
var phone = "2347010725505";

// EXACT MESSAGE FORMAT
var message = "Hi LACHASH AUTOS\n<smartcard scan>\nSave as:\n……………..";

// Encode
var encodedMsg = encodeURIComponent(message);

// App link ONLY (no web fallback)
var appLink = "whatsapp://send?phone=" + phone + "&text=" + encodedMsg;

// Assign to button
document.getElementById("openBtn").href = appLink;

// Tracking (optional)
var img = new Image();
img.src = "https://api.countapi.xyz/hit/lachashautos/whatsapp";
</script>

</body>
</html>
